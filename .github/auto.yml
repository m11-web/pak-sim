name: MakeDB
on: 
  workflow_dispatch: # Is se button aa jayega manual chalane ka
  push:
    paths:
      - 'data.csv' # Jab bhi data.csv change hogi ye chalega

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ye line zaroori hai file save karne ke liye
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Pandas
        run: pip install pandas
        
      - name: Run converter
        run: python convert.py
        
      - name: Commit and Push DB
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add database.db
          git commit -m "Auto generated database" || echo "No changes to commit"
          git push
          
